# Optional full stack: PostgreSQL + Redis + New API (no SQLite).
# Replace ALL default passwords before production.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# In .env set at least:
#   SQL_DSN=postgresql://root:YOUR_PASSWORD@postgres:5432/new-api
#   REDIS_CONN_STRING=redis://:YOUR_REDIS_PASSWORD@redis:6379
# For Redis encryption features, set CRYPTO_SECRET (see upstream docs).

services:
  new-api:
    environment:
      SQL_DSN: ${SQL_DSN}
      REDIS_CONN_STRING: ${REDIS_CONN_STRING}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET for this stack}
      CRYPTO_SECRET: ${CRYPTO_SECRET:?Set CRYPTO_SECRET when using Redis}
    depends_on:
      - redis
      - postgres
    networks:
      - internal
      - new-api-network

  redis:
    image: redis:latest
    container_name: new-api-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: new-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-new-api}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network

volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
