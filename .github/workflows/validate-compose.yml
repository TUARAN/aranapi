name: validate-compose

on:
  push:
  pull_request:

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose config (base)
        run: docker compose -f docker-compose.yml config >/dev/null

      - name: Docker Compose config (caddy)
        env:
          CADDY_DOMAIN: api.example.com
        run: docker compose -f docker-compose.yml -f docker-compose.caddy.yml config >/dev/null

      - name: Docker Compose config (tunnel)
        env:
          CLOUDFLARE_TUNNEL_TOKEN: dummy
        run: docker compose -f docker-compose.yml -f docker-compose.tunnel.yml config >/dev/null

      - name: Docker Compose config (postgres)
        env:
          POSTGRES_PASSWORD: p
          REDIS_PASSWORD: r
          SESSION_SECRET: s
          CRYPTO_SECRET: c
          SQL_DSN: postgresql://root:p@postgres:5432/new-api
          REDIS_CONN_STRING: redis://:r@redis:6379
        run: docker compose -f docker-compose.yml -f docker-compose.postgres.yml config >/dev/null
